{% extends 'base.html' %}
{% block title %}OTP Attendance — Smart Attendance{% endblock %}
{% block content %}
<div class="page-header">
  <div class="page-title">🔢 Mark Attendance by OTP</div>
  <div class="page-sub">Enter the OTP shown by your teacher for the current class.</div>
</div>

{% if message %}
<div class="alert {{ 'alert-success' if success else 'alert-danger' }}">{{ message }}</div>
{% endif %}

<div class="card" style="max-width:520px;">
  <form method="POST">
    <div class="form-group">
      <label>Attendance OTP</label>
      <input type="text" name="otp" maxlength="6" placeholder="Enter 6 digit OTP" required>
    </div>
    <button class="btn btn-primary" type="submit">✅ Mark Present</button>
  </form>
</div>
{% endblock %}

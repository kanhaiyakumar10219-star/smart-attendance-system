<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Smart Attendance — Login</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}:root{--bg:#0d0f14;--surface:#161921;--surface2:#1e2130;--border:#2a2f42;--accent:#6366f1;--text:#e8eaf0;--muted:#7b8099}body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;display:flex;align-items:center;justify-content:center}.bg-grid{position:fixed;inset:0;z-index:0;background-image:linear-gradient(rgba(99,102,241,.06) 1px,transparent 1px),linear-gradient(90deg,rgba(99,102,241,.06) 1px,transparent 1px);background-size:40px 40px}.glow{position:fixed;top:-200px;left:50%;transform:translateX(-50%);width:600px;height:600px;background:radial-gradient(circle,rgba(99,102,241,.15) 0%,transparent 70%);z-index:0;pointer-events:none}.login-wrap{position:relative;z-index:10;width:440px;max-width:95vw}.login-brand{text-align:center;margin-bottom:32px}.brand-icon{width:56px;height:56px;background:var(--accent);border-radius:16px;display:inline-flex;align-items:center;justify-content:center;font-size:28px;margin-bottom:12px}.brand-name{font-family:'Space Grotesk',sans-serif;font-size:28px;font-weight:700}.brand-sub{color:var(--muted);font-size:14px;margin-top:4px}.card{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:32px}.tabs{display:flex;background:var(--surface2);border-radius:10px;padding:4px;margin-bottom:24px;gap:4px}.tab{flex:1;text-align:center;padding:9px;border-radius:8px;font-size:14px;font-weight:500;cursor:pointer;color:var(--muted);transition:all .15s}.tab.active{background:var(--accent);color:#fff}.form-group{margin-bottom:16px}label{display:block;font-size:12px;font-weight:600;color:var(--muted);margin-bottom:6px;text-transform:uppercase;letter-spacing:.06em}input[type=text],input[type=password]{width:100%;padding:11px 14px;background:var(--surface2);border:1px solid var(--border);border-radius:8px;color:var(--text);font-size:14px;font-family:'DM Sans',sans-serif;outline:none}input:focus{border-color:var(--accent)}.btn-login{width:100%;padding:12px;background:var(--accent);color:#fff;border:none;border-radius:8px;font-size:15px;font-weight:600;cursor:pointer;font-family:'DM Sans',sans-serif;margin-top:8px}.alert-error{background:rgba(244,63,94,.1);color:#fb7185;border:1px solid rgba(244,63,94,.2);border-radius:8px;padding:11px 14px;font-size:13px;margin-bottom:16px}.demo-hint{margin-top:20px;padding:14px;background:var(--surface2);border-radius:10px;font-size:12px;color:var(--muted);border:1px solid var(--border)}.demo-hint strong{color:var(--text)}.demo-row{display:flex;justify-content:space-between;margin-top:6px}
</style></head><body><div class="bg-grid"></div><div class="glow"></div>
<div class="login-wrap"><div class="login-brand"><div class="brand-icon">🎓</div><div class="brand-name">Smart Attendance</div><div class="brand-sub">Admin Controlled Attendance Management System</div></div>
<div class="card"><div class="tabs"><div class="tab active" id="tab-admin" onclick="switchTab('admin')">🛡 Admin</div><div class="tab" id="tab-teacher" onclick="switchTab('teacher')">👩‍🏫 Teacher</div><div class="tab" id="tab-student" onclick="switchTab('student')">👨‍🎓 Student</div></div>
{% if error %}<div class="alert-error">⚠ {{ error }}</div>{% endif %}
<form method="POST"><input type="hidden" name="role" id="role-field" value="admin"><div class="form-group"><label>Username</label><input type="text" name="username" placeholder="Enter username" required autocomplete="off"></div><div class="form-group"><label>Password</label><input type="password" name="password" placeholder="••••••••" required></div><button type="submit" class="btn-login">Sign In →</button></form>
<div class="demo-hint">
  <strong>Note</strong>
  <div style="margin-top:8px;">
    Teacher and student accounts are created by Admin only.
  </div>
</div>
<script>function switchTab(role){document.getElementById('role-field').value=role;['admin','teacher','student'].forEach(r=>document.getElementById('tab-'+r).classList.toggle('active',role===r));}</script>
</body></html>

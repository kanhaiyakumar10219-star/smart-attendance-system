<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>QR Attendance — Smart Attendance</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;700&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'DM Sans', sans-serif; background: #0d0f14; color: #e8eaf0; min-height: 100vh; display: flex; align-items: center; justify-content: center; }
  .card { background: #161921; border: 1px solid #2a2f42; border-radius: 20px; padding: 48px 40px; text-align: center; max-width: 360px; width: 95vw; }
  .icon { font-size: 64px; margin-bottom: 20px; }
  .title { font-family: 'Space Grotesk', sans-serif; font-size: 22px; font-weight: 700; margin-bottom: 8px; }
  .msg { color: #7b8099; font-size: 14px; margin-bottom: 28px; }
  .btn { display: inline-block; padding: 11px 28px; background: #6366f1; color: #fff; border-radius: 8px; font-size: 14px; font-weight: 600; text-decoration: none; }
</style>
</head>
<body>
<div class="card">
  {% if success %}
  <div class="icon">✅</div>
  <div class="title" style="color:#34d399;">Attendance Marked!</div>
  <div class="msg">{{ message }}</div>
  {% else %}
  <div class="icon">❌</div>
  <div class="title" style="color:#fb7185;">Failed</div>
  <div class="msg">{{ message }}</div>
  {% endif %}
  <a href="/student/dashboard" class="btn">Go to Dashboard</a>
</div>
</body>
</html>
